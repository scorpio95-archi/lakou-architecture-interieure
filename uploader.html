<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uploader — outil interne</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;800&family=Newsreader&display=swap" rel="stylesheet">
<style>
  body{ font-family:'Newsreader', serif; background:#F6F2EA; color:#221F1B; max-width:520px; margin:60px auto; padding:0 24px; }
  h1{ font-family:'Bricolage Grotesque', sans-serif; font-size:1.4rem; }
  p.hint{ color:#6E655A; font-size:0.9rem; margin-bottom:24px; }
  input[type="file"]{ width:100%; margin-bottom:16px; }
  button{ background:#221F1B; color:#F6F2EA; border:none; padding:12px 20px; font-family:'Bricolage Grotesque', sans-serif; font-weight:700; cursor:pointer; }
  button:disabled{ opacity:0.5; }
  #result{ margin-top:20px; }
  #urlBox{ width:100%; padding:10px; font-family:monospace; font-size:0.85rem; border:1px solid #D8CFBE; background:#fff; }
  #status{ margin-top:10px; font-size:0.85rem; }
  img#preview{ max-width:100%; margin-top:16px; border:1px solid #D8CFBE; }
</style>
</head>
<body>
  <h1>Uploader — Architecture Intérieure</h1>
  <p class="hint">Outil interne : choisis une image, elle est envoyée dans le bucket <code>architecture-interieure</code>, et tu récupères son lien public direct à coller où tu veux (bannière, cartes, etc.). Cette page n'est pas destinée aux visiteurs du site.</p>

  <input type="file" id="fileInput" accept="image/*">
  <button id="uploadBtn">Envoyer et obtenir le lien</button>

  <div id="result" style="display:none;">
    <input type="text" id="urlBox" readonly>
    <button id="copyBtn" style="margin-top:8px;">Copier le lien</button>
    <img id="preview">
  </div>
  <div id="status"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://xhrhqgpzewyfenidyaox.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhocmhxZ3B6ZXd5ZmVuaWR5YW94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5OTA1NDQsImV4cCI6MjA5OTU2NjU0NH0.76-Z2nXAOUKWew-bvgTBhxAeYKbfkJZErwqUHrlQE3g';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const result = document.getElementById('result');
    const urlBox = document.getElementById('urlBox');
    const preview = document.getElementById('preview');
    const status = document.getElementById('status');
    const copyBtn = document.getElementById('copyBtn');

    uploadBtn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file){ status.textContent = 'Choisis une image d\'abord.'; return; }

      uploadBtn.disabled = true;
      uploadBtn.textContent = 'Envoi...';
      status.textContent = '';

      try {
        const path = `${Date.now()}-${file.name}`;
        const { error: uploadError } = await sb.storage.from('architecture-interieure').upload(path, file);
        if (uploadError) throw uploadError;

        const { data } = sb.storage.from('architecture-interieure').getPublicUrl(path);
        urlBox.value = data.publicUrl;
        preview.src = data.publicUrl;
        result.style.display = 'block';
        status.textContent = 'Envoyé.';

      } catch (err){
        status.textContent = 'Erreur : ' + (err.message || err);
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = 'Envoyer et obtenir le lien';
      }
    });

    copyBtn.addEventListener('click', () => {
      urlBox.select();
      navigator.clipboard.writeText(urlBox.value);
      status.textContent = 'Lien copié.';
    });
  </script>
</body>
</html>
